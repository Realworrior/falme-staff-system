    <title>Betmfalme</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Space+Grotesk:wght@400;500;600;700&family=Space+Mono:wght@400;700&family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://unicons.iconscout.com/release/v4.0.0/css/line.css">
    <script>
      window.onerror = function(msg, url, lineNo, columnNo, error) {
        console.error('GLOBAL ERROR:', msg, error);
        return false;
      };
      window.addEventListener('unhandledrejection', function(event) {
        console.error('UNHANDLED REJECTION:', event.reason);
      });
      // Safety check to ensure root is filled
      setTimeout(() => {
        const root = document.getElementById('root');
        if (root && root.innerHTML === '' && !window.__REACT_DEVTOOLS_GLOBAL_HOOK__) {
          console.warn('Root is empty after 3s. Possible mount failure.');
        }
      }, 3000);
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
