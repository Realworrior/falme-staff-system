<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    :root {
      --bg-color: #060609;
      --card-bg: rgba(255, 255, 255, 0.03);
      --accent: #10b981;
      --accent-glow: rgba(16, 185, 129, 0.2);
      --text: #f8fafc;
      --text-muted: #64748b;
      --border: rgba(255, 255, 255, 0.06);
      --surface: #0f111a;
    }
    
    body { 
      width: 650px; 
      padding: 0; 
      margin: 0;
      font-family: 'Inter', system-ui, -apple-system, sans-serif; 
      background: var(--bg-color); 
      color: var(--text); 
      overflow-x: hidden;
    }

    .main-container {
      padding: 24px;
      display: flex;
      flex-direction: column;
      gap: 24px;
    }

    /* CATEGORY NAV */
    .category-nav {
      display: flex;
      gap: 10px;
      overflow-x: auto;
      padding: 4px 0 16px;
      scrollbar-width: none;
    }

    .category-nav::-webkit-scrollbar { display: none; }

    .nav-item {
      padding: 8px 16px;
      background: rgba(255,255,255,0.03);
      border: 1px solid var(--border);
      border-radius: 12px;
      font-size: 10px;
      font-weight: 800;
      text-transform: uppercase;
      color: var(--text-muted);
      cursor: pointer;
      white-space: nowrap;
      transition: all 0.2s;
    }

    .nav-item.active {
      background: var(--accent);
      color: white;
      border-color: var(--accent);
      box-shadow: 0 4px 15px var(--accent-glow);
    }

    .search-section {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 20px;
      box-shadow: 0 10px 40px rgba(0,0,0,0.3);
    }

    #search-input {
      width: 100%;
      background: rgba(0,0,0,0.4);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 14px 18px;
      color: white;
      font-size: 14px;
      outline: none;
      box-sizing: border-box;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }

    /* GRID LAYOUT FOR TEMPLATES */
    .template-list {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
    }
    
    .template-card {
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 20px;
      transition: all 0.3s;
      display: flex;
      flex-direction: column;
      height: 100%;
      box-sizing: border-box;
      max-width: 100%;
      overflow: hidden;
    }

    .template-card:hover {
      border-color: rgba(255,255,255,0.15);
      background: rgba(255,255,255,0.05);
    }

    .card-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 12px;
    }

    .card-title {
      font-size: 13px;
      font-weight: 800;
      color: var(--text);
    }

    .card-category {
      font-size: 9px;
      font-weight: 900;
      text-transform: uppercase;
      color: var(--accent);
      background: var(--accent-glow);
      padding: 2px 8px;
      border-radius: 4px;
    }

    .tone-selector {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-bottom: 16px;
    }

    .tone-btn {
      padding: 6px 12px;
      border-radius: 8px;
      background: rgba(255,255,255,0.05);
      border: 1px solid var(--border);
      color: var(--text-muted);
      font-size: 9px;
      font-weight: 700;
      cursor: pointer;
      white-space: nowrap;
      transition: all 0.2s;
    }

    .tone-btn.active {
      background: white;
      color: black;
      border-color: white;
    }

    .response-preview {
      font-size: 13px;
      line-height: 1.6;
      color: var(--text-muted);
      margin-bottom: 20px;
      white-space: pre-line;
      flex: 1;
      overflow-wrap: break-word;
      word-break: break-word;
    }

    .inject-mini-btn {
      background: var(--accent);
      color: white;
      border: none;
      border-radius: 8px;
      padding: 10px 16px;
      font-size: 10px;
      font-weight: 900;
      text-transform: uppercase;
      cursor: pointer;
      width: 100%;
    }

    #error-msg {
      position: fixed;
      bottom: 20px;
      left: 20px;
      right: 20px;
      background: #ef4444;
      color: white;
      padding: 12px;
      border-radius: 10px;
      font-size: 11px;
      font-weight: 800;
      display: none;
      z-index: 1000;
      box-shadow: 0 10px 30px rgba(239, 68, 68, 0.3);
      text-align: center;
    }
  </style>
</head>
<body>
  <div class="header">
    <div class="header-brand">
      <div class="header-logo" style="width: 32px; height: 32px; background: var(--accent-glow); border-radius: 8px; display: flex; align-items: center; justify-content: center; box-shadow: 0 0 15px var(--accent-glow);">
        <img src="icon.svg" alt="Logo" style="width: 20px; height: 20px; object-fit: contain;" />
      </div>
      <h3 style="margin-left: 12px;">Quick Injector</h3>
    </div>
    <div id="status-indicator" class="status-dot"></div>
  </div>

  <div class="main-container">
    <div id="status-text" style="font-size: 10px; color: var(--text-muted); margin-bottom: 8px; font-style: italic;">Syncing...</div>

    <div class="search-section">
      <div class="section-label">
        <span>✨ AI Matcher</span>
        <span id="match-count">0 items</span>
      </div>
      <input type="text" id="search-input" placeholder="Paste client message..." />
    </div>

    <div id="ai-suggestion-box">
      <div class="ai-badge">✨ Draft Recommendation</div>
      <div id="ai-suggestion-content"></div>
      <button id="ai-inject-btn" class="action-btn">Inject to Chat</button>
    </div>

    <div class="category-nav" id="category-nav">
      <!-- Dynamic categories -->
    </div>

    <div class="template-list" id="templates">
       <div style="text-align: center; padding: 40px; color: var(--text-muted); font-size: 12px; grid-column: span 2;">Syncing Intelligence Matrix...</div>
    </div>
  </div>

  <div id="error-msg"></div>
  <script src="popup.js"></script>
</body>
</html>
