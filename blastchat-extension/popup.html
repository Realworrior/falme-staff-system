<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    :root {
      --bg-color: #060609;
      --card-bg: rgba(255, 255, 255, 0.03);
      --accent: #10b981;
      --accent-glow: rgba(16, 185, 129, 0.2);
      --text: #f8fafc;
      --text-muted: #64748b;
      --border: rgba(255, 255, 255, 0.06);
      --surface: #0f111a;
    }
    
    body { 
      width: 420px; 
      padding: 0; 
      margin: 0;
      font-family: 'Inter', system-ui, -apple-system, sans-serif; 
      background: var(--bg-color); 
      color: var(--text); 
      overflow-x: hidden;
    }

    .main-container {
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 20px;
    }
    
    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px 20px;
      background: rgba(255,255,255,0.02);
      border-bottom: 1px solid var(--border);
    }
    
    .header-brand {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .header-logo {
      width: 28px;
      height: 28px;
      background: var(--accent-glow);
      border: 1px solid rgba(16, 185, 129, 0.3);
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 0 15px var(--accent-glow);
    }
    
    h3 { 
      margin: 0; 
      font-size: 11px; 
      text-transform: uppercase; 
      letter-spacing: 2px; 
      font-weight: 900;
      color: var(--text);
    }
    
    .status-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--accent);
      box-shadow: 0 0 10px var(--accent);
    }

    .search-section {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 16px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.2);
    }

    .section-label {
      font-size: 9px;
      font-weight: 900;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: var(--text-muted);
      margin-bottom: 12px;
      display: flex;
      justify-content: space-between;
    }

    #search-input {
      width: 100%;
      background: rgba(0,0,0,0.3);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 12px 14px;
      color: white;
      font-size: 13px;
      outline: none;
      box-sizing: border-box;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }

    #search-input:focus {
      border-color: var(--accent);
      background: rgba(0,0,0,0.5);
      box-shadow: 0 0 0 3px var(--accent-glow);
    }

    /* AI RECOMMENDATION BOX */
    #ai-suggestion-box {
      background: linear-gradient(165deg, rgba(16, 185, 129, 0.1), rgba(59, 130, 246, 0.1));
      border: 1px solid rgba(16, 185, 129, 0.2);
      border-radius: 16px;
      padding: 16px;
      display: none;
      animation: slideIn 0.4s cubic-bezier(0.16, 1, 0.3, 1);
    }

    @keyframes slideIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .ai-badge {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      padding: 4px 10px;
      background: var(--accent);
      color: white;
      border-radius: 6px;
      font-size: 9px;
      font-weight: 900;
      text-transform: uppercase;
      margin-bottom: 12px;
    }

    #ai-suggestion-content {
      font-size: 13px;
      line-height: 1.6;
      color: var(--text);
      margin-bottom: 16px;
      white-space: pre-line;
    }

    .action-btn {
      background: white;
      color: black;
      border: none;
      border-radius: 8px;
      padding: 10px 16px;
      font-size: 11px;
      font-weight: 800;
      text-transform: uppercase;
      cursor: pointer;
      transition: all 0.2s;
      width: 100%;
    }

    .action-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 5px 15px rgba(255,255,255,0.1);
    }

    /* TEMPLATE ITEMS */
    .template-list {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    
    .template-card {
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 16px;
      transition: all 0.3s;
    }

    .template-card:hover {
      border-color: rgba(255,255,255,0.15);
      background: rgba(255,255,255,0.05);
    }

    .card-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 12px;
    }

    .card-title {
      font-size: 13px;
      font-weight: 800;
      color: var(--text);
    }

    .card-category {
      font-size: 9px;
      font-weight: 900;
      text-transform: uppercase;
      color: var(--accent);
      background: var(--accent-glow);
      padding: 2px 8px;
      border-radius: 4px;
    }

    .tone-selector {
      display: flex;
      gap: 6px;
      margin-bottom: 12px;
      overflow-x: auto;
      padding-bottom: 4px;
    }

    .tone-btn {
      padding: 5px 10px;
      border-radius: 6px;
      background: rgba(255,255,255,0.05);
      border: 1px solid var(--border);
      color: var(--text-muted);
      font-size: 9px;
      font-weight: 700;
      cursor: pointer;
      white-space: nowrap;
      transition: all 0.2s;
    }

    .tone-btn.active {
      background: white;
      color: black;
      border-color: white;
    }

    .response-preview {
      font-size: 12px;
      line-height: 1.5;
      color: var(--text-muted);
      max-height: 100px;
      overflow: hidden;
      margin-bottom: 12px;
      white-space: pre-line;
    }

    .inject-mini-btn {
      background: var(--accent);
      color: white;
      border: none;
      border-radius: 6px;
      padding: 6px 12px;
      font-size: 9px;
      font-weight: 900;
      text-transform: uppercase;
      cursor: pointer;
      width: 100%;
    }

    #error-msg {
      position: fixed;
      bottom: 20px;
      left: 20px;
      right: 20px;
      background: #ef4444;
      color: white;
      padding: 12px;
      border-radius: 10px;
      font-size: 11px;
      font-weight: 800;
      display: none;
      z-index: 1000;
      box-shadow: 0 10px 30px rgba(239, 68, 68, 0.3);
      text-align: center;
    }
  </style>
</head>
<body>
  <div class="header">
    <div class="header-brand">
      <div class="header-logo">
        <img src="icon.svg" alt="Logo" style="width: 16px; height: 16px; object-fit: contain;" />
      </div>
      <h3>Quick Injector</h3>
    </div>
    <div id="status-indicator" class="status-dot"></div>
  </div>

  <div class="main-container">
    <div id="status-text" style="font-size: 10px; color: var(--text-muted); margin-bottom: 8px; font-style: italic;">Syncing...</div>

    <div class="search-section">
      <div class="section-label">
        <span>✨ AI Matcher</span>
        <span id="match-count">0 items</span>
      </div>
      <input type="text" id="search-input" placeholder="Paste client message..." />
    </div>

    <div id="ai-suggestion-box">
      <div class="ai-badge">✨ Draft Recommendation</div>
      <div id="ai-suggestion-content"></div>
      <button id="ai-inject-btn" class="action-btn">Inject to Chat</button>
    </div>

    <div class="template-list" id="templates">
       <div style="text-align: center; padding: 40px; color: var(--text-muted); font-size: 12px;">Syncing Intelligence Matrix...</div>
    </div>
  </div>

  <div id="error-msg"></div>
  <script src="popup.js"></script>
</body>
</html>
