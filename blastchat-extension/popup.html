<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>BlastChat Matrix</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=Space+Grotesk:wght@700&family=JetBrains+Mono:wght@500;800&display=swap');

    :root {
      --bg: #000000;
      --surface: #0a0a0f;
      --border: #1e1e2d;
      --orange: #f97316;
      --orange-dim: rgba(249, 115, 22, 0.1);
      --text: #ffffff;
      --text-muted: #64748b;
      --mono: 'JetBrains Mono', monospace;
    }

    * { box-sizing: border-box; }

    body { 
      width: 640px; 
      height: 600px;
      margin: 0;
      padding: 0;
      font-family: 'Inter', sans-serif; 
      background: var(--bg);
      color: var(--text); 
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    /* SCROLLBAR */
    ::-webkit-scrollbar { width: 4px; height: 4px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 10px; }
    ::-webkit-scrollbar-thumb:hover { background: var(--orange); }

    /* HEADER */
    header {
      flex-shrink: 0;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 16px 20px;
    }

    .header-main {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .logo {
      width: 32px;
      height: 32px;
      background: var(--orange);
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 0 15px rgba(249, 115, 22, 0.3);
    }

    .brand-text h1 {
      margin: 0;
      font-size: 14px;
      font-weight: 900;
      text-transform: uppercase;
      letter-spacing: -0.01em;
      color: #fff;
    }

    .brand-text p {
      margin: 0;
      font-size: 8px;
      font-weight: 800;
      color: var(--orange);
      text-transform: uppercase;
      letter-spacing: 0.2em;
    }

    /* STICKY NAV SECTION */
    .sticky-controls {
      flex-shrink: 0;
      background: var(--bg);
      padding: 16px 20px 0;
      display: flex;
      flex-direction: column;
      gap: 16px;
      z-index: 50;
      border-bottom: 1px solid var(--border);
      padding-bottom: 16px;
      width: 100%;
    }

    /* SEARCH */
    .search-input-wrapper {
      position: relative;
    }

    .search-icon {
      position: absolute;
      left: 14px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--text-muted);
      pointer-events: none;
    }

    #search-input {
      width: 100%;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 12px 12px 12px 40px;
      color: #fff;
      font-size: 13px;
      font-weight: 500;
      outline: none;
      transition: border-color 0.2s;
    }

    /* DROPDOWN & WRAP FIX */
    .controls-grid {
      display: grid;
      grid-template-columns: 1fr 180px;
      gap: 12px;
      align-items: center;
    }

    .category-dropdown-wrapper {
      position: relative;
    }

    #category-select {
      width: 100%;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 11px 16px;
      color: #fff;
      font-size: 11px;
      font-weight: 800;
      text-transform: uppercase;
      outline: none;
      appearance: none;
      cursor: pointer;
      transition: border-color 0.2s;
    }

    #category-select:focus {
      border-color: var(--orange);
    }

    .dropdown-icon {
      position: absolute;
      right: 12px;
      top: 50%;
      transform: translateY(-50%);
      pointer-events: none;
      color: var(--text-muted);
    }

    .shortcuts-row {
      display: flex;
      flex-wrap: wrap; /* REMOVE SCROLLING - WRAP INSTEAD */
      gap: 8px;
      width: 100%;
    }

    .shortcut-tag {
      padding: 6px 12px;
      background: var(--orange-dim);
      border: 1px solid rgba(249, 115, 22, 0.2);
      border-radius: 8px;
      font-size: 10px;
      font-weight: 800;
      color: var(--orange);
      white-space: nowrap;
      cursor: pointer;
      text-transform: uppercase;
      transition: all 0.2s;
    }

    .shortcut-tag:hover {
      background: var(--orange);
      color: #fff;
      border-color: var(--orange);
    }

    .shortcut-tag.active {
      background: var(--orange);
      color: #fff;
      border-color: var(--orange);
      box-shadow: 0 0 15px rgba(249, 115, 22, 0.4);
    }

    .nav-link {
      flex-shrink: 0;
      font-size: 11px;
      font-weight: 900;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.05em;
      cursor: pointer;
      white-space: nowrap;
      padding: 4px 8px;
      position: relative;
      transition: color 0.2s;
    }

    .nav-link.active {
      color: var(--orange);
    }

    .nav-link.active::after {
      content: '';
      position: absolute;
      bottom: -16px;
      left: 0; right: 0;
      height: 2px;
      background: var(--orange);
      box-shadow: 0 0 10px var(--orange);
    }

    /* CONTENT AREA */
    #content-scroll {
      flex: 1;
      overflow-y: auto;
      padding: 20px;
    }

    .template-stack {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
    }

    /* CARD DESIGN */
    .matrix-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      height: 100%;
    }

    .card-header {
      height: 4px;
      background: var(--orange);
      width: 100%;
    }

    .card-meta {
      padding: 12px 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 1px solid var(--border);
      background: rgba(255,255,255,0.01);
    }

    .card-number {
      font-family: var(--mono);
      font-size: 10px;
      font-weight: 800;
      color: var(--orange);
      opacity: 0.6;
    }

    .card-title {
      font-size: 12px;
      font-weight: 800;
      color: #fff;
      flex: 1;
      padding: 16px;
      border-bottom: 1px solid var(--border);
    }

    .card-body {
      padding: 16px;
    }

    .response-text {
      font-size: 12px;
      line-height: 1.6;
      color: var(--text-muted);
      white-space: pre-wrap;
      cursor: pointer;
      transition: opacity 0.2s;
    }

    .response-text:hover {
      opacity: 0.7;
    }

    .copy-btn {
      width: 100%;
      margin-top: 16px;
      background: var(--orange-dim);
      border: 1px solid rgba(249, 115, 22, 0.3);
      border-radius: 8px;
      padding: 12px;
      color: var(--orange);
      font-size: 11px;
      font-weight: 900;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      transition: all 0.2s;
    }

    .copy-btn:hover {
      background: var(--orange);
      color: #fff;
    }

    /* UTILS */
    .placeholder-highlight {
      color: var(--orange);
      font-weight: 800;
    }

    #error-toast {
      position: fixed;
      bottom: 20px;
      left: 20px;
      right: 20px;
      background: #ef4444;
      color: #fff;
      padding: 12px;
      border-radius: 8px;
      font-size: 11px;
      font-weight: 800;
      display: none;
      z-index: 1000;
      text-align: center;
      text-transform: uppercase;
    }

    .empty-state {
      padding: 60px 20px;
      text-align: center;
      color: var(--text-muted);
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1px;
    }
  </style>
</head>
<body>
  <header>
    <div class="header-main">
      <div class="brand">
        <div class="logo">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
            <path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z"/>
          </svg>
        </div>
        <div class="brand-text">
          <h1>BlastChat Matrix</h1>
          <p>Intelligence Platform</p>
        </div>
      </div>
      <div style="font-size: 9px; font-weight: 900; color: var(--text-muted); text-transform: uppercase;" id="status-text">
        Ready
      </div>
    </div>
  </header>

  <div class="sticky-controls">
    <div class="controls-grid">
      <div class="search-input-wrapper">
        <div class="search-icon">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/>
          </svg>
        </div>
        <input type="text" id="search-input" placeholder="Search Intelligence..." autocomplete="off">
      </div>

      <div class="category-dropdown-wrapper">
        <select id="category-select">
          <option value="ALL">All Categories</option>
          <!-- Options injected here -->
        </select>
        <div class="dropdown-icon">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="m6 9 6 6 6-6"/></svg>
        </div>
      </div>
    </div>

    <div class="shortcuts-row" id="shortcuts-row">
      <!-- Keywords injected here -->
    </div>
  </div>

  <div id="content-scroll">
    <div id="templates" class="template-stack">
      <div class="empty-state">Initializing Neural Sync...</div>
    </div>
  </div>

  <div id="error-toast"></div>
  <script src="popup.js"></script>
</body>
</html>
